<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Khmer Stroke Collector</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #F3F4F6; }
        #canvas { background: white; border: 2px solid #4F46E5; touch-action: none; }
        select, button { font-size: 18px; margin: 10px 5px; padding: 8px; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Khmer Stroke Collector</h2>

<label for="char">Select Letter:</label>
<select id="char">
    {% for c in letters %}
        <option value="{{c}}">{{c}}</option>
    {% endfor %}
</select>

<button onclick="clearCanvas()">Clear</button>
<button onclick="saveData()">Save</button>

<p id="status">Samples: 0 / 50</p>

<canvas id="canvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let strokes = [];
let currentStroke = [];

canvas.addEventListener("pointerdown", e => {
    currentStroke = [[e.offsetX, e.offsetY]];
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("pointermove", e => {
    if (currentStroke.length > 0) {
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
        currentStroke.push([e.offsetX, e.offsetY]);
    }
});

canvas.addEventListener("pointerup", e => {
    if (currentStroke.length > 1) {
        strokes.push(currentStroke);
    }
    currentStroke = [];
});

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokes = [];
}

function saveData() {
    if (strokes.length === 0) {
        alert("Draw something first!");
        return;
    }
    const char = document.getElementById("char").value;

    fetch("/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ char: char, strokes: strokes })
    })
    .then(r => r.json())
    .then(res => {
        if (res.status === "full") {
            document.getElementById("status").innerText = 
                `Samples full for ${char} (50/50)`;
            clearCanvas();
        } else {
            document.getElementById("status").innerText = 
                `Samples: ${res.count} / 50`;
            clearCanvas();
        }
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
